<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JAY RPS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
    --bg-color: #0b1528;
    --card-bg: rgba(255, 255, 255, 0.05);
    --border-glow: rgba(255, 255, 255, 0.1);
    --blue: #00f2fe;
    --purple: #b35cff;
    --pink: #ff477e;
    --green: #00f5a0;
    --yellow: #ffb800;
}
body {
    margin: 0;
    background: var(--bg-color);
    color: #fff;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
}
.app-container {
    width: 100%;
    max-width: 420px;
    padding: 24px;
    box-sizing: border-box;
}
.hidden { display: none !important; }
h1 {
    font-size: 62px;
    margin-bottom: 10px;
    font-weight: 800;
    background: linear-gradient(90deg,#00d4ff,#7aa6ff,#d56cff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow: 0 0 25px rgba(0,212,255,0.25);
}
.subtitle { color: #8fa0bc; margin-bottom: 40px; font-size: 14px; }
.startBtn {
    width: 100%;
    padding: 16px;
    font-size: 20px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(90deg,#00d4ff,#7aa6ff,#d56cff);
    border: none;
    border-radius: 16px;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4);
    transition: 0.2s;
}
.startBtn:active { transform: scale(0.98); }
.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 8px;
}
.stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border-glow);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 8px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}
.stat-card .icon { font-size: 16px; margin-bottom: 2px; }
.stat-card .val { font-size: 16px; font-weight: 800; line-height: 1.2; }
.stat-card .lbl { font-size: 9px; color: #8fa0bc; font-weight: 600; letter-spacing: 1px; margin-top: 2px; }

.life-card { padding: 6px 4px; }
#hearts {
    font-size:20px !important;
    line-height:1;
    white-space:nowrap;
    letter-spacing:-2px;
    color:#ff3b5c;
}
.b-blue { border-color: rgba(0, 242, 254, 0.3); box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.05); }
.b-purple { border-color: rgba(179, 92, 255, 0.3); box-shadow: inset 0 0 10px rgba(179, 92, 255, 0.05); }
.b-pink { border-color: rgba(255, 71, 126, 0.3); box-shadow: inset 0 0 10px rgba(255, 71, 126, 0.05); }
.b-green { border-color: rgba(0, 245, 160, 0.3); box-shadow: inset 0 0 10px rgba(0, 245, 160, 0.05); }
.b-yellow { border-color: rgba(255, 184, 0, 0.3); box-shadow: inset 0 0 10px rgba(255, 184, 0, 0.05); }
.game-title {
    font-size: 24px;
    margin: 0 0 20px 0;
    font-weight: 800;
    background: linear-gradient(90deg,#00d4ff,#7aa6ff,#d56cff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.player-labels { display: flex; justify-content: space-between; padding: 0 30px; font-weight: 600; color: #8fa0bc; font-size: 12px; letter-spacing: 1px; }
.arena { height: 200px; position: relative; margin: 15px 0; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); }
.hand { position: absolute; top: 40px; font-size: 90px; transition: 0.1s; }
.left { left: 25px; }
.right { right: 25px; }
#count { font-size: 48px; font-weight: 800; color: var(--blue); position: absolute; left: 50%; top: 60px; transform: translateX(-50%); z-index: 5; text-shadow: 0 0 15px var(--blue); }
.shakeL { animation: l 0.15s infinite alternate; }
.shakeR { animation: r 0.15s infinite alternate; }
@keyframes l { from { transform: translateX(0) rotate(0); } to { transform: translateX(25px) rotate(10deg); } }
@keyframes r { from { transform: translateX(0) rotate(0); } to { transform: translateX(-25px) rotate(-10deg); } }
#boom { position: absolute; left: 50%; top: 60px; transform: translateX(-50%) scale(0); font-size: 70px; opacity: 0; z-index: 10; }
.show { animation: b 0.4s ease-out; }
@keyframes b { 0% { opacity: 0; transform: translateX(-50%) scale(0.5); } 40% { opacity: 1; transform: translateX(-50%) scale(1.4); } 100% { opacity: 0; transform: translateX(-50%) scale(1); } }
#result { font-size: 20px; font-weight: 600; height: 35px; margin-bottom: 15px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
.choice { display: flex; justify-content: center; gap: 16px; margin-top: 10px; }
.choice button {
    width: 85px;
    height: 85px;
    font-size: 36px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    background: rgba(255,255,255,0.06);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.choice button:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); transform: translateY(-4px); }
.choice button:active { transform: scale(0.92); }
.bgParticle { position: fixed; width: 6px; height: 6px; border-radius: 50%; background: rgba(0, 242, 254, 0.15); animation: float 12s linear infinite; pointer-events: none; z-index: -1; }
@keyframes float { from { transform: translateY(105vh); } to { transform: translateY(-10vh); } }
.modal-overlay { position: fixed; inset: 0; background: rgba(5, 11, 22, 0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9999; animation: fadeIn 0.3s ease; }
.modal-box { background: #111d35; border: 1px solid rgba(255,255,255,0.1); padding: 30px 24px; border-radius: 28px; text-align: center; width: 85%; max-width: 340px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
.modal-box h1 { font-size: 32px; color: var(--pink); margin-top: 0; text-shadow: 0 0 15px rgba(255,71,126,0.4); }
.modal-box p { margin: 12px 0; font-size: 15px; color: #8fa0bc; }
.modal-box .score-highlight { font-size: 22px; color: #fff; font-weight: bold; margin: 15px 0; }
.modal-btn { width: 100%; padding: 12px; margin: 6px 0; border: none; border-radius: 12px; font-weight: bold; font-family: 'Poppins', sans-serif; cursor: pointer; transition: 0.2s; }
.btn-primary {
    background: linear-gradient(90deg,#00d4ff,#7aa6ff,#d56cff);
    color: #000;
}
.btn-secondary {
    background: linear-gradient(90deg,#00d4ff,#7aa6ff,#d56cff);
    color: #000;
    border: none;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.menu-logo{
    font-size:72px;
    margin-bottom:10px;
    display:block;
    animation:pulseFloat 2.5s ease-in-out infinite;
    filter:drop-shadow(0 0 15px rgba(0,212,255,.5));
}
.menu-card{
    background: rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:28px;
    padding:28px 20px;
    backdrop-filter: blur(10px);
}
@keyframes pulseFloat{
    0%,100%{transform:translateY(0) scale(1);}
    50%{transform:translateY(-10px) scale(1.08);}
}

</style>
</head>
<body>

<div class="bgParticle" style="left:10%"></div>
<div class="bgParticle" style="left:35%;animation-duration:16s;background:rgba(179,92,255,0.15)"></div>
<div class="bgParticle" style="left:70%;animation-duration:14s"></div>
<div class="bgParticle" style="left:90%;animation-duration:18s;background:rgba(255,71,126,0.15)"></div>

<div class="app-container">
    <div id="menu">
        <div class="menu-card">
            <div class="menu-logo">✊✋✌️</div>
            <h1>JAY RPS</h1>
            <p class="subtitle">Rock • Paper • Scissors<br>Beat the AI and set a new High Score!</p>
            <button class="startBtn" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <div id="game" class="hidden">
        <h2 class="game-title">JAY RPS</h2>
        
        <div class="stats-grid">
            <div class="stat-card b-blue">
                <span class="icon">🔥</span>
                <span class="val" id="score">0</span>
                <span class="lbl">SCORE</span>
            </div>
            <div class="stat-card b-purple">
                <span class="icon">🥇</span>
                <span class="val" id="high">0</span>
                <span class="lbl">HIGH</span>
            </div>
            <div class="stat-card b-pink life-card" id="heartsBox">
                <span class="val" id="hearts">❤️❤️❤️❤️❤️</span>
                <span class="lbl" style="margin-top: 5px;">LIFE</span>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card b-green">
                <span class="icon">🏆</span>
                <span class="val" id="wins">0</span>
                <span class="lbl">WIN</span>
            </div>
            <div class="stat-card b-pink">
                <span class="icon">💀</span>
                <span class="val" id="losses">0</span>
                <span class="lbl">LOSE</span>
            </div>
            <div class="stat-card b-yellow">
                <span class="icon">🤝</span>
                <span class="val" id="draws">0</span>
                <span class="lbl">DRAW</span>
            </div>
        </div>

        <div class="player-labels">
            <div>YOU</div>
            <div>AI</div>
        </div>

        <div class="arena">
            <div id="count"></div>
            <div id="left" class="hand left">🤜</div>
            <div id="right" class="hand right">🤛</div>
            <div id="boom">💥</div>
        </div>

        <div id="result">Ready!</div>

        <div class="choice">
            <button onclick="play('✊')">✊</button>
            <button onclick="play('✋')">✋</button>
            <button onclick="play('✌️')">✌️</button>
        </div>
    </div>
</div>

<script>

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function tone(freq,duration,type='sine',vol=0.03){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = vol;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function sClick(){ tone(700,0.05,'square'); }
function sCount(){ tone(900,0.08,'square'); }
function sReveal(){ tone(450,0.12,'triangle'); }
function sWin(){
    tone(800,0.08,'triangle',0.05);
    setTimeout(()=>tone(1100,0.10,'triangle',0.05),70);
    setTimeout(()=>tone(1500,0.15,'triangle',0.06),140);
}
function sLose(){ tone(400,0.12,'sawtooth'); setTimeout(()=>tone(220,0.18,'sawtooth'),90); }
function sDraw(){ tone(650,0.10,'triangle'); }

let score=0,wins=0,losses=0,draws=0;
let lives=5;
let high=Number(localStorage.getItem('jay_highscore')||0);

document.getElementById('high').textContent=high;

function startGame(){
    menu.classList.add('hidden');
    game.classList.remove('hidden');
}

function backMenu(){
    game.classList.add('hidden');
    menu.classList.remove('hidden');
}

function updateHearts(){
    let txt='';
    for(let i=0;i<5;i++){
        txt += i<lives ? '♥' : '♡';
    }
    hearts.textContent = txt;
}

function gameOver(){
    if(score>high){
        high=score;
        localStorage.setItem('jay_highscore',high);
        document.getElementById('high').textContent=high;
    }

    document.body.insertAdjacentHTML('beforeend',
    `<div id="go" class="modal-overlay">
        <div class="modal-box">
            <h1 style="color: var(--pink); -webkit-text-fill-color: unset; background:none; text-shadow:0 0 15px rgba(255,71,126,0.4);">💀 GAME OVER</h1>
            <div class="score-highlight">Final Score: ${score}</div>
            <p>🥇 High Score: ${high}</p>
            <p style="font-size:13px; background:rgba(255,255,255,0.04); padding:6px; border-radius:8px;">
                🏆 ${wins} Wins &nbsp;•&nbsp; 💀 ${losses} Losses &nbsp;•&nbsp; 🤝 ${draws} Draws
            </p>
            <button class="modal-btn btn-primary" onclick="playAgain()">PLAY AGAIN</button>
            <button class="modal-btn btn-secondary" onclick="mainMenu()">MAIN MENU</button>
        </div>
    </div>`);
}

function resetStats(){
    score=0;lives=5;wins=0;losses=0;draws=0;
    scoreEl.textContent=0;
    document.getElementById('wins').textContent=0;
    document.getElementById('losses').textContent=0;
    document.getElementById('draws').textContent=0;
    updateHearts();
    result.textContent='Ready!';
}

function playAgain(){
    document.getElementById('go').remove();
    resetStats();
}

function mainMenu(){
    document.getElementById('go').remove();
    resetStats();
    backMenu();
}

const scoreEl=document.getElementById('score');

async function play(me){
    sClick();
    if(count.textContent !== '') return;

    left.className='hand left shakeL';
    right.className='hand right shakeR';
    left.textContent='🤜';
    right.textContent='🤛';
    result.textContent='Thinking...';

    for(const n of ['3','2','1']){
        count.textContent=n;
        sCount();
        await new Promise(r=>setTimeout(r,300));
    }

    count.textContent='';
    left.className='hand left';
    right.className='hand right';

    const arr=['✊','✋','✌️'];
    const ai=arr[Math.floor(Math.random()*3)];

    left.textContent=me;
    right.textContent=ai;

    sReveal();
    boom.classList.add('show');
    setTimeout(()=>boom.classList.remove('show'),400);

    if(me===ai){
        score+=10;
        draws++;
        document.getElementById('draws').textContent=draws;
        result.textContent='🤝 DRAW (+10)';
        sDraw();
    }
    else if(
        (me==='✊'&&ai==='✌️')||
        (me==='✋'&&ai==='✊')||
        (me==='✌️'&&ai==='✋')
    ){
        score+=25;
        wins++;
        document.getElementById('wins').textContent=wins;
        result.textContent='🏆 WIN (+25)';
        sWin();
        if(navigator.vibrate) navigator.vibrate([100,50,100]);
    }else{
        lives--;
        losses++;
        document.getElementById('losses').textContent=losses;
        result.textContent='💀 LOSE (-1 LIFE)';
        sLose();
    }

    scoreEl.textContent=score;
    updateHearts();

    if(score>high){
        high=score;
        localStorage.setItem('jay_highscore',high);
        document.getElementById('high').textContent=high;
    }

    if(lives<=0){
        setTimeout(() => { gameOver(); }, 600);
    }
}
updateHearts();
</script>
</body>
</html>
