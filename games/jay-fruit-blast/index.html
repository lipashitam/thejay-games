<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💎 JAY MATCH 3</title>


<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:radial-gradient(circle at top,#1f2937,#0b1020);
color:white;
text-align:center;
min-height:100vh;
overflow-x:hidden;
}

h1{
margin-top:15px;
font-size:42px;
color:white;
text-shadow:0 0 10px #c084fc,0 0 25px #c084fc;
}

.clickbait{

margin:15px auto;
padding:18px;

width:90%;
max-width:520px;

background:linear-gradient(135deg,#4c1d95,#7e22ce);

border:2px solid #c084fc;

border-radius:20px;

box-shadow:0 0 20px rgba(192,132,252,.5);

animation:float 2s infinite alternate;

}

.clickbait h2{

font-size:30px;
color:white;

margin-bottom:12px;

text-shadow:0 0 10px #ff00ff;

}

.clickbait p{

font-size:18px;

margin:8px 0;

color:#ffe082;

}

.info{
display:flex;
justify-content:center;
gap:20px;
margin:10px;
font-size:20px;
font-weight:bold;
}

#board{
width:min(92vw,520px);
height:min(92vw,520px);
margin:auto;
display:grid;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(8,1fr);
gap:4px;
padding:8px;
background:#160029;
border:4px solid #c084fc;
border-radius:20px;
box-shadow:0 0 20px #c084fc;
touch-action:none;
}

.tile{
display:flex;
align-items:center;
justify-content:center;
font-size:min(6vw,28px);
border-radius:14px;
cursor:pointer;
user-select:none;
transition:.15s;
background:rgba(255,255,255,.05);
}

.tile:hover{
transform:scale(1.05);
}

.selected{
outline:3px solid white;
transform:scale(1.08);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.btn{
padding:12px 24px;
border:none;
border-radius:12px;
font-size:20px;
font-weight:bold;
cursor:pointer;
background:#c084fc;
color:#140021;
margin-top:15px;
}

.gameover{
font-size:50px;
color:#ff4d4d;
margin-bottom:15px;
}

.timer{
font-size:20px;
margin-bottom:10px;
color:#ffd700;
}
@keyframes jGlow{

0%{
transform:scale(1);
}

100%{
transform:scale(1.08);
box-shadow:
0 0 15px #d946ef,
0 0 30px #d946ef,
0 0 45px #ff00ff,
0 0 60px #ff66ff;
}

}
.jgem{

width:48px;
height:48px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:28px;
font-weight:bold;

color:#ffffff;

background:radial-gradient(circle,#ff66ff,#8a00ff);

text-shadow:
0 0 2px #ffffff,
0 0 4px #ffffff,
0 0 8px #ffccff;

box-shadow:
0 0 5px #d946ef,
0 0 10px #d946ef,
0 0 15px #c026d3;
animation:jGlow 1s infinite alternate;

}

@keyframes jGlow{

from{
transform:scale(1);
}

to{
transform:scale(1.1);
box-shadow:
0 0 20px #ff00ff,
0 0 40px #ff00ff,
0 0 60px #ff66ff;
}

}
@keyframes pop{

0%{
transform:scale(.5);
opacity:0;
}

70%{
transform:scale(1.05);
}

100%{
transform:scale(1);
opacity:1;
}

}
@keyframes float{

from{
transform:translateY(0px);
}

to{
transform:translateY(-5px);
}

}

@media (max-width:600px){

.tile{
font-size:22px;
}

.jgem{
width:34px;
height:34px;
font-size:20px;
}

}

.info{

display:flex;

justify-content:center;

gap:15px;

margin:15px;

}

.card{

background:rgba(255,255,255,.08);

padding:12px 25px;

border-radius:18px;

border:2px solid rgba(255,255,255,.15);

box-shadow:0 0 15px rgba(192,132,252,.3);

min-width:140px;

}

.title{

font-size:16px;

color:#ffd700;

margin-bottom:5px;

}

.value{

font-size:30px;

font-weight:bold;

color:white;

text-shadow:0 0 8px #c084fc;

}
</style>
</head>
<body>

<h1 class="logo">
🍓 JAY FRUIT BLAST 🍓
</h1>



<div class="info">

<div class="card">

<div class="title">
⭐ SCORE
</div>

<div id="score" class="value">
0
</div>

</div>

<div class="card">

<div class="title">
👑 BEST
</div>

<div id="highscore" class="value">
0
</div>

</div>

</div>

<div class="timer">
⏰ Time: <span id="timer">60</span>
</div>

<div id="board"></div>

<div id="overlay" class="overlay">

<h1>🍓 FRUIT BLAST 🍓</h1>

<div class="clickbait">

<h2>🔥 ONLY 1% OF PLAYERS CAN SCORE 10,000+!</h2>

<p>🎯 Match 3 or more fruits.</p>

<p>🔥 Create crazy combos.</p>

<p>💜 Find the Purple J Orb.</p>

<p>🏆 Beat your high score!</p>

</div>

<p style="margin:10px">
📱 Swipe on Mobile<br>
💻 Click on Desktop
</p>

<button id="startBtn" class="btn">
🍓 START GAME 🍓
</button>

</div>

<script>
const board=document.getElementById("board");

const scoreEl=document.getElementById("score");
const highEl=document.getElementById("highscore");
const timerEl=document.getElementById("timer");
const overlay=document.getElementById("overlay");

function playGameOverSound(){
        

const ctx = new AudioContext();

const osc = ctx.createOscillator();

const gain = ctx.createGain();

osc.type = "sine";

osc.frequency.setValueAtTime(400, ctx.currentTime);

osc.frequency.exponentialRampToValueAtTime(
150,
ctx.currentTime + 0.8
);

gain.gain.setValueAtTime(0.2, ctx.currentTime);

gain.gain.exponentialRampToValueAtTime(
0.001,
ctx.currentTime + 0.8
);

osc.connect(gain);

gain.connect(ctx.destination);

osc.start();

osc.stop(ctx.currentTime + 0.8);

}

function playMatchSound(){

    try{

        const audio = new AudioContext();

        const osc = audio.createOscillator();

        const gain = audio.createGain();

        osc.type = "triangle";
        osc.frequency.value = 600;

        gain.gain.value = 0.05;

        osc.connect(gain);
        gain.connect(audio.destination);

        osc.start();

        setTimeout(()=>{
            osc.stop();
            audio.close();
        },100);

    }catch(e){
        console.log(e);
    }

}


const gems=[
"🍎",
"🍋",
"🍇",
"🍓",
"🥝",
"J"
];

let grid=[];
let score=0;
let selected=null;
let gameStarted=false;
let timer=60;
let countdown;

let highScore=
localStorage.getItem("jayMatchHigh")||0;

highEl.textContent=highScore;

function randomGem(){
return gems[Math.floor(Math.random()*gems.length)];
}

function createBoard(){

grid=[];

for(let r=0;r<8;r++){

let row=[];

for(let c=0;c<8;c++){
row.push(randomGem());
}

grid.push(row);
}

render();
}

function render(){

board.innerHTML="";

for(let r=0;r<8;r++){

for(let c=0;c<8;c++){

const tile=document.createElement("div");

tile.className="tile";
tile.dataset.row=r;
tile.dataset.col=c;

if(grid[r][c]===null){

    tile.textContent="";

}else if(grid[r][c]=="J"){

    tile.innerHTML='<div class="jgem">J</div>';

}else{

    tile.textContent=grid[r][c];

}

tile.onclick=()=>selectTile(r,c);

board.appendChild(tile);
}
}
}

function selectTile(r,c){

if(!gameStarted) return;

if(selected===null){

    selected={r,c};

    render();

    highlight(r,c);

    return;
}

// klik permata yang sama = batal pilih
if(selected.r === r && selected.c === c){
    selected = null;
    render();
    return;
}

if(
    adjacent(
        selected.r,
        selected.c,
        r,
        c
    )
){
    swap(
        selected.r,
        selected.c,
        r,
        c
    );

    selected = null;
    render();
}else{

    // jika klik jauh, ganti pilihan ke permata baru
    selected = {r,c};

    render();
    highlight(r,c);
}
}

function highlight(r,c){

const index=r*8+c;

board.children[index].classList.add("selected");
}

function adjacent(a,b,c,d){

return Math.abs(a-c)+Math.abs(b-d)===1;
}

function swap(r1,c1,r2,c2){

    if(r2<0||r2>7||c2<0||c2>7)return;

    if(!adjacent(r1,c1,r2,c2))return;

    let temp=grid[r1][c1];

    grid[r1][c1]=grid[r2][c2];
    grid[r2][c2]=temp;

    render();

    setTimeout(()=>{

        let matched=checkMatches();

        if(!matched){

            // kembalikan posisi semula
            let temp=grid[r1][c1];

            grid[r1][c1]=grid[r2][c2];
            grid[r2][c2]=temp;

            render();
        }

    },100);

}
console.log("SAMPAI SINI");
function checkMatches(){

let found=false;

for(let r=0;r<8;r++){

for(let c=0;c<6;c++){

let gem=grid[r][c];

if(
gem &&
gem===grid[r][c+1] &&
gem===grid[r][c+2]
){

found=true;

for(let k=0;k<3;k++)
grid[r][c+k]=null;

score+=10;

if(gem==="J")
score+=50;
}
}
}

for(let c=0;c<8;c++){

for(let r=0;r<6;r++){

let gem=grid[r][c];

if(
gem &&
gem===grid[r+1][c] &&
gem===grid[r+2][c]
){

found=true;

for(let k=0;k<3;k++)
grid[r+k][c]=null;

score+=10;

if(gem==="J")
score+=50;
}
}
}

if(found){

    playMatchSound();

    dropGems();

    scoreEl.textContent=score;

    if(score>highScore){

        highScore=score;

        localStorage.setItem(
            "jayMatchHigh",
            highScore
        );

        highEl.textContent=highScore;
    }

}

return found;


function dropGems(){

    for(let c=0;c<8;c++){

        let column=[];

        // ambil semua yang bukan null
        for(let r=0;r<8;r++){
            if(grid[r][c]!==null){
                column.push(grid[r][c]);
            }
        }

        // tambah buah baru di atas
        while(column.length<8){
            column.unshift(randomGem());
        }

        // masukkan kembali ke grid
        for(let r=0;r<8;r++){
            grid[r][c]=column[r];
        }
    }

    render();

    setTimeout(()=>{
        checkMatches();
    },150);
}



render();

setTimeout(()=>{

    checkMatches();

    render();

},150);
}

function startGame(){

score=0;
timer=60;

scoreEl.textContent=0;
timerEl.textContent=60;

createBoard();

overlay.style.display="none";

gameStarted=true;

clearInterval(countdown);

countdown=setInterval(()=>{

timer--;

timerEl.textContent=timer;

if(timer<=0){

clearInterval(countdown);

gameOver();
}

},1000);
}

function gameOver(){

playGameOverSound();

gameStarted=false;

overlay.innerHTML=`

<div style="

background:linear-gradient(180deg,#3b0764,#1e1b4b);
padding:30px;
border-radius:25px;
width:90%;
max-width:380px;
box-shadow:0 0 30px #c084fc;
animation:pop .4s;

">

<div style="
font-size:65px;
margin-bottom:10px;
">
😢
</div>

<div style="
font-size:40px;
font-weight:bold;
color:#ff4d4d;
text-shadow:0 0 10px red;
">
GAME OVER
</div>

<div style="
margin-top:20px;
font-size:24px;
">
🍓 Score
</div>

<div style="
font-size:50px;
font-weight:bold;
color:#ffd700;
margin-bottom:15px;
">
${score}
</div>

<div style="
font-size:22px;
color:#c084fc;
">
🏆 Best Score
</div>

<div style="
font-size:30px;
font-weight:bold;
margin-bottom:25px;
">
${highScore}
</div>

<button class="btn"
onclick="location.reload()"
style="
width:100%;
font-size:24px;
padding:15px;
">
🎮 PLAY AGAIN
</button>

</div>

`;

overlay.style.display="flex";
}

document
.getElementById("startBtn")
.addEventListener("click",startGame);

let startX=0;
let startY=0;

board.addEventListener("touchstart",(e)=>{

startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
});

board.addEventListener("touchend",(e)=>{

if(!selected) return;

let endX=e.changedTouches[0].clientX;
let endY=e.changedTouches[0].clientY;

let dx=endX-startX;
let dy=endY-startY;

let r=selected.r;
let c=selected.c;

if(Math.abs(dx)>Math.abs(dy)){

if(dx>20) swap(r,c,r,c+1);

if(dx<-20) swap(r,c,r,c-1);

}else{

if(dy>20) swap(r,c,r+1,c);

if(dy<-20) swap(r,c,r-1,c);
}

selected=null;
});
</script>

</body>
</html>
