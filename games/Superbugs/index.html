<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Superbugs Ultimate Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #020105;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            background: #000000;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.25);
            overflow: hidden;
        }
        #score-display {
            position: absolute;
            top: 25px;
            left: 20px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            z-index: 10;
        }
        #score-num {
            color: #00ff66;
            font-size: 28px;
            display: block;
            margin-top: 5px;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.6);
        }
        #powerup-ui {
            position: absolute;
            top: 25px;
            right: 20px;
            color: #00ff66;
            font-weight: bold;
            font-size: 14px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #00ff66;
            display: none;
            z-index: 10;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            background: rgba(0, 0, 0, 0.92);
            color: #ffffff;
            text-align: center;
            padding: 30px;
        }
        .screen h1 {
            font-size: 38px;
            color: #ffffff;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        .screen h2 {
            font-size: 34px;
            color: #ff3355;
            margin-bottom: 10px;
        }
        .instructions {
            border: 1px dashed #555;
            padding: 15px;
            border-radius: 5px;
            max-width: 320px;
            margin: 20px 0;
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
            text-align: left;
            background: #050505;
        }
        .btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 14px 45px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
            transition: transform 0.1s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .hide { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-display">SCORE: <span id="score-num">0</span></div>
        <div id="powerup-ui">DOUBLE LASER: <span id="pu-time">8</span>s</div>

        <div id="start-screen" class="screen">
            <h1>SUPERBUGS</h1>
            <div class="instructions">
                <strong>MISSION MANUAL:</strong><br>
                • <strong>Slide/Move</strong> left or right to control.<br>
                • Weapons only fire while you are moving!<br>
                • 💥 Collect <strong>[ P ]</strong> item for Double Lasers!<br>
                • Each destroyed bug grants <strong>+2 Points</strong>.
            </div>
            <button class="btn" id="start-btn">ENGAGE</button>
        </div>

        <div id="gameover-screen" class="screen hide">
            <h2>SHIP DESTROYED</h2>
            <p style="font-size: 20px; margin: 25px 0;">FINAL SCORE: <span id="final-score" style="color: #00ff66; font-weight:bold;">0</span></p>
            <button class="btn" id="retry-btn">REDEPLOY</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // --- Retro Audio Engine ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'laser') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(650, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.07);
                gain.gain.setValueAtTime(0.04, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.07);
                osc.start(now); osc.stop(now + 0.07);
            } else if (type === 'explosion') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(130, now);
                osc.frequency.linearRampToValueAtTime(25, now + 0.25);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now); osc.stop(now + 0.25);
            } else if (type === 'enemy_laser') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(450, now + 0.1);
                gain.gain.setValueAtTime(0.02, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'powerup') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(900, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        // --- Game Setup ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreNum = document.getElementById('score-num');
        const powerupUi = document.getElementById('powerup-ui');
        const puTimeNum = document.getElementById('pu-time');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const finalScore = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');
        const retryBtn = document.getElementById('retry-btn');

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let isGameActive = false;
        let score = 0;
        let player = { x: 225, y: 0, w: 34, h: 26, targetX: 225, isMoving: false };
        let bullets = [];
        let enemyBullets = [];
        let bugs = [];
        let particles = [];
        let stars = [];
        let powerups = [];
        let shootCooldown = 0;
        let currentWave = 1;
        let waveTimer = 0;
        let powerupTimer = 0; 
        let shakeIntensity = 0; 

        // Background Stars
        for(let i=0; i<35; i++) {
            stars.push({ x: Math.random() * 450, y: Math.random() * 850, speed: 0.8 + Math.random() * 1.5, size: 1.5 });
        }

        function initGame() {
            score = 0;
            scoreNum.innerText = score;
            bullets = [];
            enemyBullets = [];
            bugs = [];
            particles = [];
            powerups = [];
            shootCooldown = 0;
            waveTimer = 0;
            currentWave = 1;
            powerupTimer = 0;
            shakeIntensity = 0;
            powerupUi.style.display = 'none';
            player.x = canvas.width / 2;
            player.targetX = canvas.width / 2;
            player.y = canvas.height - 110;

            spawnBugWave();
        }

        function spawnBugWave() {
            for(let i=0; i<6; i++) {
                bugs.push({ x: 30 + Math.random() * (canvas.width - 60), y: 60 + Math.random() * 140, w: 12, h: 12, type: 'spore', hp: 1, flash: 0, shootTimer: 0, speedX: 0, color: '#2b7fff' });
            }

            if (currentWave % 3 === 0) {
                // MAIN BOSS WAVE
                bugs.push({ x: canvas.width / 2, y: 160, w: 64, h: 75, type: 'boss', hp: 20, flash: 0, shootTimer: 0, speedX: 0.9, color: '#632363' });
            } else {
                const rand = Math.random();
                if (rand < 0.33) {
                    // Formation A: Crabs + Green Winged Bees
                    bugs.push({ x: 100, y: 240, w: 42, h: 34, type: 'crab', hp: 3, flash: 0, shootTimer: 20, speedX: 0.8, color: '#de2847' });
                    bugs.push({ x: canvas.width - 100, y: 240, w: 42, h: 34, type: 'crab', hp: 3, flash: 0, shootTimer: 50, speedX: -0.8, color: '#de2847' });
                    bugs.push({ x: 150, y: 340, w: 32, h: 28, type: 'bee', hp: 2, flash: 0, shootTimer: 10, speedX: 1.2, color: '#4cf24c' });
                    bugs.push({ x: canvas.width - 150, y: 340, w: 32, h: 28, type: 'bee', hp: 2, flash: 0, shootTimer: 70, speedX: -1.2, color: '#4cf24c' });
                } 
                else if (rand < 0.66) {
                    // Formation B: Blue Beetle + Wavy Worm
                    bugs.push({ x: canvas.width / 2, y: 220, w: 40, h: 36, type: 'beetle', hp: 4, flash: 0, shootTimer: 30, speedX: 1, color: '#2b7fff' });
                    let segmentColors = ['#9c5239', '#9c5239', '#f76bb5', '#9c5239', '#9c5239', '#f76bb5'];
                    for(let i=0; i<6; i++) {
                        bugs.push({ x: 40 + (i * 30), y: 360, w: 24, h: 24, type: 'worm', hp: 1, flash: 0, shootTimer: 0, speedX: 0.5, color: segmentColors[i], isDonut: (segmentColors[i] === '#f76bb5'), seed: i });
                    }
                } 
                else {
                    // Formation C: Perfect Blend Mix
                    bugs.push({ x: 80, y: 220, w: 42, h: 34, type: 'crab', hp: 3, flash: 0, shootTimer: 40, speedX: 0.6, color: '#de2847' });
                    bugs.push({ x: canvas.width/2, y: 280, w: 40, h: 36, type: 'beetle', hp: 4, flash: 0, shootTimer: 80, speedX: -0.8, color: '#2b7fff' });
                    bugs.push({ x: canvas.width - 80, y: 340, w: 32, h: 28, type: 'bee', hp: 2, flash: 0, shootTimer: 10, speedX: 1.4, color: '#4cf24c' });
                }
            }
        }

        function startGame() {
            initAudio();
            startScreen.classList.add('hide');
            gameoverScreen.classList.add('hide');
            resize();
            initGame();
            setTimeout(() => { isGameActive = true; }, 100);
        }

        function gameOver() {
            isGameActive = false;
            finalScore.innerText = score;
            gameoverScreen.classList.remove('hide');
        }

        // --- Controls ---
        startBtn.addEventListener('click', startGame);
        startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); });
        retryBtn.addEventListener('click', startGame);
        retryBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); });

        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.targetX = e.clientX - rect.left;
        });
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                const rect = canvas.getBoundingClientRect();
                player.targetX = e.touches[0].clientX - rect.left;
            }
        }, { passive: false });

        function createExplosion(x, y, color) {
            playSound('explosion');
            for(let i=0; i<18; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 7,
                    vy: (Math.random() - 0.5) * 7,
                    size: 2 + Math.random() * 3,
                    life: 25,
                    color: color
                });
            }
        }

        // --- Renders ---
        function drawPlayerShip(x, y) {
            ctx.save();
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(x - 3, y - 14, 6, 28); 
            ctx.fillRect(x - 15, y + 4, 30, 8);  
            ctx.fillRect(x - 15, y - 4, 4, 8);   
            ctx.fillRect(x + 11, y - 4, 4, 8);   

            ctx.fillStyle = powerupTimer > 0 ? '#00ff66' : '#4cf24c'; 
            ctx.fillRect(x - 2, y - 8, 4, 8);
            ctx.restore();
        }

        function drawExactBug(b) {
            ctx.save();
            if (b.flash > 0) {
                ctx.fillStyle = '#ffffff';
                b.flash--;
            } else {
                ctx.fillStyle = b.color;
            }

            if (b.type === 'boss') {
                ctx.fillStyle = b.flash > 0 ? '#ffffff' : '#fce2c4';
                ctx.fillRect(b.x - 24, b.y - b.h/2, 6, 18);
                ctx.fillRect(b.x + 18, b.y - b.h/2, 6, 18);

                ctx.fillStyle = b.flash > 0 ? '#ffffff' : b.color;
                ctx.fillRect(b.x - 24, b.y - b.h/2 + 10, 48, 36);
                ctx.fillStyle = b.flash > 0 ? '#ffffff' : '#f76bb5';
                ctx.fillRect(b.x - 8, b.y - b.h/2 + 10, 16, 10);

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(b.x - 16, b.y - 2, 10, 8);
                ctx.fillRect(b.x + 6, b.y - 2, 10, 8);
                ctx.fillStyle = '#de2847';
                ctx.fillRect(b.x - 13, b.y + 1, 4, 4);
                ctx.fillRect(b.x + 9, b.y + 1, 4, 4);

                ctx.fillStyle = b.flash > 0 ? '#ffffff' : '#e0a100';
                ctx.fillRect(b.x - 20, b.y + 20, 40, 16);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(b.x - 4, b.y + 20, 8, 16);
            } 
            else if (b.type === 'crab') {
                ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h - 8);
                ctx.fillStyle = b.flash > 0 ? '#ffffff' : '#596978';
                ctx.fillRect(b.x - b.w/2 - 6, b.y - 10, 6, 16);
                ctx.fillRect(b.x + b.w/2, b.y - 10, 6, 16);
                ctx.fillRect(b.x - b.w/2 - 6, b.y - 14, 12, 4);
                ctx.fillRect(b.x + b.w/2 - 6, b.y - 14, 12, 4);

                ctx.fillStyle = b.flash > 0 ? '#ffffff' : b.color;
                ctx.fillRect(b.x - 14, b.y + b.h/2 - 8, 4, 6);
                ctx.fillRect(b.x + 10, b.y + b.h/2 - 8, 4, 6);

                ctx.fillStyle = '#000000';
                ctx.fillRect(b.x - 12, b.y - 6, 6, 4);
                ctx.fillRect(b.x + 6, b.y - 6, 6, 4);
            } 
            else if (b.type === 'bee') {
                ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
                let wingOffset = Math.sin(Date.now() * 0.03) * 4;
                ctx.fillStyle = '#e0a100';
                ctx.fillRect(b.x - b.w/2 - 5, b.y - 6, 5, 12 + wingOffset);
                ctx.fillRect(b.x + b.w/2, b.y - 6, 5, 12 + wingOffset);
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(b.x - 6, b.y - b.h/2, 3, 4);
                ctx.fillRect(b.x + 3, b.y - b.h/2, 3, 4);
            }
            else if (b.type === 'beetle') {
                ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
                ctx.fillStyle = '#8291a1';
                ctx.fillRect(b.x - 12, b.y - b.h/2 - 8, 4, 8);
                ctx.fillRect(b.x + 8, b.y - b.h/2 - 8, 4, 8);
            }
            else if (b.type === 'worm') {
                if (b.isDonut) {
                    ctx.fillStyle = '#f76bb5';
                    ctx.beginPath(); ctx.arc(b.x, b.y, b.w/2, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath(); ctx.arc(b.x, b.y, b.w/4, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#000000';
                    ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.beginPath(); ctx.arc(b.x, b.y, b.w/2, 0, Math.PI*2); ctx.fill();
                }
            }
            else if (b.type === 'spore') {
                let pulseSize = Math.sin(Date.now() * 0.005 + b.x) * 2;
                ctx.fillRect(b.x - b.w/2 - pulseSize/2, b.y - b.h/2, b.w + pulseSize, b.h);
                ctx.fillStyle = '#94c2ff';
                ctx.fillRect(b.x - b.w/2, b.y - b.h/2 - 3, b.w, 3);
            }
            ctx.restore();
        }

        // --- Loop Engine ---
        function loop() {
            ctx.save();
            
            if (shakeIntensity > 0) {
                let dx = (Math.random() - 0.5) * shakeIntensity;
                let dy = (Math.random() - 0.5) * shakeIntensity;
                ctx.translate(dx, dy);
                shakeIntensity *= 0.9; 
                if (shakeIntensity < 0.2) shakeIntensity = 0;
            }

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(s => {
                s.y += s.speed;
                if (s.y > canvas.height) s.y = 0;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });

            if (isGameActive) {
                let movementDiff = Math.abs(player.targetX - player.x);
                player.isMoving = (movementDiff > 1.2);

                player.x += (player.targetX - player.x) * 0.26; 
                if (player.x < player.w/2) player.x = player.w/2;
                if (player.x > canvas.width - player.w/2) player.x = canvas.width - player.w/2;

                if (powerupTimer > 0) {
                    powerupTimer -= 1/60; 
                    powerupUi.style.display = 'block';
                    puTimeNum.innerText = Math.ceil(powerupTimer);
                    if (powerupTimer <= 0) powerupUi.style.display = 'none';
                }

                shootCooldown--;
                if (player.isMoving && shootCooldown <= 0) {
                    if (powerupTimer > 0) {
                        bullets.push({ x: player.x - 10, y: player.y - 15, speed: -8.5 });
                        bullets.push({ x: player.x + 10, y: player.y - 15, speed: -8.5 });
                    } else {
                        bullets.push({ x: player.x, y: player.y - 15, speed: -8.5 });
                    }
                    playSound('laser');
                    shootCooldown = 20; 
                }

                let activeThreats = bugs.filter(b => b.type !== 'spore').length;
                if (activeThreats === 0) {
                    waveTimer++;
                    if (waveTimer > 35) { 
                        currentWave++;
                        spawnBugWave();
                        waveTimer = 0;
                    }
                }
            }

            for (let i = powerups.length - 1; i >= 0; i--) {
                let pu = powerups[i];
                pu.y += 2;
                
                ctx.fillStyle = Date.now() % 200 < 100 ? '#00ff66' : '#ffffff';
                ctx.fillRect(pu.x - 10, pu.y - 10, 20, 20);
                ctx.fillStyle = '#000000';
                ctx.font = 'bold 14px Arial';
                ctx.fillText("P", pu.x - 5, pu.y + 5);

                if (pu.y > canvas.height) {
                    powerups.splice(i, 1);
                    continue;
                }

                if (isGameActive && pu.x > player.x - player.w/2 && pu.x < player.x + player.w/2 &&
                    pu.y > player.y - player.h/2 && pu.y < player.y + player.h/2) {
                    powerupTimer = 8; 
                    playSound('powerup');
                    powerups.splice(i, 1);
                }
            }

            ctx.fillStyle = '#f7ae31';
            for (let i = bullets.length - 1; i >= 0; i--) {
                let bullet = bullets[i];
                bullet.y += bullet.speed;
                ctx.fillRect(bullet.x - 1.5, bullet.y, 3, 11);

                if (bullet.y < -20) {
                    bullets.splice(i, 1);
                    continue;
                }

                for (let j = bugs.length - 1; j >= 0; j--) {
                    let bug = bugs[j];
                    if (bullet.x > bug.x - bug.w/2 && bullet.x < bug.x + bug.w/2 &&
                        bullet.y > bug.y - bug.h/2 && bullet.y < bug.y + bug.h/2) {
                        
                        bullets.splice(i, 1);
                        bug.hp--;
                        bug.flash = 3; 

                        if (bug.hp <= 0) {
                            createExplosion(bug.x, bug.y, bug.color);
                            
                            if (bug.type === 'beetle' && Math.random() < 0.4) {
                                powerups.push({ x: bug.x, y: bug.y });
                            } else if (bug.type === 'boss') {
                                powerups.push({ x: bug.x, y: bug.y });
                                shakeIntensity = 10; 
                            } else {
                                shakeIntensity = 4; 
                            }

                            // UPDATE MECHANIC: Earn +2 Points per kill
                            score += 2; 
                            scoreNum.innerText = score;
                            bugs.splice(j, 1);
                        }
                        break;
                    }
                }
            }

            ctx.fillStyle = '#ff3333';
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                let eb = enemyBullets[i];
                eb.y += eb.speed;
                ctx.fillRect(eb.x - 2, eb.y, 4, 10);

                if (eb.y > canvas.height) {
                    enemyBullets.splice(i, 1);
                    continue;
                }

                if (isGameActive && eb.x > player.x - player.w/2 && eb.x < player.x + player.w/2 &&
                    eb.y > player.y - player.h/2 && eb.y < player.y + player.h/2) {
                    createExplosion(player.x, player.y, '#ffffff');
                    enemyBullets.splice(i, 1);
                    gameOver();
                }
            }

            bugs.forEach((bug) => {
                bug.x += bug.speedX;
                if (bug.x < bug.w/2 || bug.x > canvas.width - bug.w/2) {
                    bug.speedX *= -1;
                    bug.y += 12; 
                }

                if (isGameActive && bug.type !== 'spore' && bug.type !== 'worm') {
                    bug.shootTimer++;
                    let interval = 170;
                    if (bug.type === 'boss') interval = 75;    
                    if (bug.type === 'beetle') interval = 120; 

                    if (bug.shootTimer > interval) {
                        if (bug.type === 'boss') {
                            enemyBullets.push({ x: bug.x - 15, y: bug.y + 20, speed: 4.5 });
                            enemyBullets.push({ x: bug.x, y: bug.y + 20, speed: 5 });
                            enemyBullets.push({ x: bug.x + 15, y: bug.y + 20, speed: 4.5 });
                        } else if (bug.type === 'beetle') {
                            enemyBullets.push({ x: bug.x - 10, y: bug.y + 10, speed: 4 });
                            enemyBullets.push({ x: bug.x + 10, y: bug.y + 10, speed: 4 });
                        } else {
                            enemyBullets.push({ x: bug.x, y: bug.y + bug.h/2, speed: 4 });
                        }
                        playSound('enemy_laser');
                        bug.shootTimer = Math.random() * 30;
                    }
                }

                if (bug.type === 'worm') {
                    bug.y += Math.sin(Date.now() * 0.005 + bug.seed) * 0.4;
                }

                drawExactBug(bug);

                if (isGameActive && bug.y > canvas.height - 90 && bug.type !== 'spore') {
                    gameOver();
                }
            });

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life--;
                p.vx *= 0.96; p.vy *= 0.96; 
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                if (p.life <= 0) particles.splice(i, 1);
            }

            if (isGameActive) {
                drawPlayerShip(player.x, player.y);
            }

            // Platform Base
            ctx.fillStyle = '#63537d';
            ctx.fillRect(0, canvas.height - 75, canvas.width, 14);
            ctx.fillStyle = '#de7b31';
            for(let k=0; k<canvas.width; k+=35) {
                ctx.fillRect(k, canvas.height - 75, 14, 14);
            }

            ctx.restore(); 
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
